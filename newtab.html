<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📐 Smart WS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <script src="vendor/fabric.min.js"></script>
  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="vendor/katex/katex.min.js"></script>
</head>

<body>
  <!-- ═══ TOP TOOLBAR ══════════════════════════════════════════ -->
  <header class="toolbar">
    <div class="toolbar-brand">📐 Smart WS</div>

    <div class="toolbar-tools">
      <!-- Active Tool -->
      <button class="tool-btn active" id="toolSelect" title="เลือก (V)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 0l16 12-7 2-4 8L4 0z" />
        </svg>
      </button>
      <button class="tool-btn" id="toolText" title="เพิ่มข้อความ (T)">T</button>
      <button class="tool-btn" id="toolRect" title="วาดกล่อง (R)">▭</button>
      <button class="tool-btn" id="toolLine" title="วาดเส้น (L)">—</button>
      <button class="tool-btn" id="toolEquation" title="แทรกสมการ LaTeX (E)">∑</button>
      <button class="tool-btn" id="toolImageSearch" title="ค้นหารูปฟรี">🖼️</button>
      <div class="toolbar-sep"></div>
      <button class="tool-btn" id="toolUndo" title="ย้อนกลับ (Ctrl+Z)">↩</button>
      <button class="tool-btn" id="toolRedo" title="ทำซ้ำ (Ctrl+Y)">↪</button>
      <div class="toolbar-sep"></div>
      <button class="tool-btn" id="toolDelete" title="ลบที่เลือก (Del)">🗑</button>
    </div>

    <div class="toolbar-color">
      <label class="color-label">Fill</label>
      <input type="color" id="colorFill" value="#ffffff" title="สี Fill" />
      <label class="color-label">Stroke</label>
      <input type="color" id="colorStroke" value="#1e293b" title="สี Stroke" />
      <label class="color-label">Text</label>
      <input type="color" id="colorText" value="#1e293b" title="สี Text" />
    </div>

    <div class="toolbar-actions">
      <button class="action-btn save-btn" id="btnSave">💾 บันทึก</button>
      <button class="action-btn load-btn" id="btnLoad">📂 โหลด</button>
      <div class="export-group">
        <button class="action-btn export-btn" id="btnExportPNG">🖼 PNG</button>
        <button class="action-btn export-btn" id="btnExportPDF">📄 PDF</button>
        <button class="action-btn export-btn" id="btnExportDOCX">📝 Word</button>
      </div>
    </div>
  </header>

  <!-- ═══ MAIN LAYOUT ══════════════════════════════════════════ -->
  <div class="main-layout">

    <!-- LEFT PANEL — SVG Library -->
    <aside class="svg-panel">
      <div class="panel-search-wrap">
        <input type="text" id="svgSearch" class="panel-search" placeholder="🔍 ค้นหารูป..." />
      </div>
      <div class="panel-filter-wrap">
        <label class="panel-filter-label">
          <input type="checkbox" id="monoOnlyFilter" />
          Monoline only
        </label>
      </div>

      <!-- Upload your own SVG -->
      <div class="panel-upload">
        <label class="upload-btn" for="svgFileInput">📁 นำเข้า SVG จากเครื่อง</label>
        <input type="file" id="svgFileInput" accept=".svg" style="display:none" />
      </div>

      <!-- Categories -->
      <div class="panel-categories" id="panelCategories">
        <!-- Populated by panel.js -->
      </div>
    </aside>

    <!-- CENTER — Canvas -->
    <main class="canvas-area">
      <div class="page-shadow">
        <canvas id="worksheetCanvas"></canvas>
      </div>
      <div class="page-nav-bar">
        <button class="action-btn load-btn" id="btnPrevPage">◀ หน้าเดิม</button>
        <span class="page-indicator" id="pageIndicator">หน้า 1 / 1</span>
        <button class="action-btn load-btn" id="btnNextPage">หน้าถัดไป ▶</button>
        <button class="action-btn save-btn" id="btnAddPage">➕ เพิ่มหน้า</button>
      </div>
    </main>

    <!-- RIGHT PANEL — Properties -->
    <aside class="props-panel">
      <div class="props-title">⚙️ คุณสมบัติ</div>
      <div id="propsContent" class="props-empty">เลือก Object บน Canvas</div>

      <!-- Text props (shown when text selected) -->
      <div id="textProps" style="display:none">
        <div class="prop-row">
          <label>ขนาด Font</label>
          <input type="number" id="propFontSize" value="20" min="6" max="200" class="prop-input" />
        </div>
        <div class="prop-row">
          <label>Font</label>
          <select id="propFontFamily" class="prop-select">
            <option value="Sarabun">Sarabun (Thai)</option>
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier New</option>
            <option value="Times New Roman">Times New Roman</option>
          </select>
        </div>
        <div class="prop-row">
          <label>Bold / Italic</label>
          <div class="prop-toggle-row">
            <button class="prop-toggle" id="propBold"><b>B</b></button>
            <button class="prop-toggle" id="propItalic"><i>I</i></button>
            <button class="prop-toggle" id="propUnderline"><u>U</u></button>
          </div>
        </div>
        <div class="prop-row">
          <label>จัดข้อความ</label>
          <div class="prop-toggle-row">
            <button class="prop-toggle" id="propAlignLeft">⬛</button>
            <button class="prop-toggle" id="propAlignCenter">▪</button>
            <button class="prop-toggle" id="propAlignRight">⬛</button>
          </div>
        </div>
      </div>

      <!-- Object props (always shown when something selected) -->
      <div id="objectProps" style="display:none">
        <div class="prop-row">
          <label>Opacity</label>
          <input type="range" id="propOpacity" min="0" max="100" value="100" class="prop-range" />
          <span id="propOpacityVal">100%</span>
        </div>
        <div class="prop-row">
          <label>ลำดับชั้น</label>
          <div class="prop-toggle-row">
            <button class="prop-toggle" id="propBringFwd" title="ขึ้นมาข้างบน">▲</button>
            <button class="prop-toggle" id="propSendBwd" title="ลงไปข้างล่าง">▼</button>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- ═══ SCRIPTS ═══════════════════════════════════════════════ -->
  <!-- ═══ EQUATION MODAL ══════════════════════════════════════ -->
  <div id="equationModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-icon">∑</span>
        <h2 class="modal-title">สมการ / Text+Math</h2>
        <button class="modal-close" id="eqModalClose">✕</button>
      </div>

      <!-- Mode Tabs -->
      <div class="eq-tabs">
        <button class="eq-tab tab-active" id="modeTabEq">∑ LaTeX เท่านั้น</button>
        <button class="eq-tab" id="modeTabMix">📝 ข้อความ + $สมการ$</button>
      </div>

      <!-- Quick insert chips -->
      <div class="eq-chips">
        <span class="eq-chip-label">แทรกด่วน:</span>
        <button class="eq-chip" data-latex="\frac{a}{b}">a/b</button>
        <button class="eq-chip" data-latex="x^{2}">x²</button>
        <button class="eq-chip" data-latex="\sqrt{x}">√x</button>
        <button class="eq-chip" data-latex="\sum_{i=1}^{n}">Σ</button>
        <button class="eq-chip" data-latex="\int_{a}^{b}">∫</button>
        <button class="eq-chip" data-latex="\lim_{x \to \infty}">lim</button>
        <button class="eq-chip" data-latex="\vec{F}=m\vec{a}">F=ma</button>
        <button class="eq-chip" data-latex="E=mc^{2}">E=mc²</button>
        <button class="eq-chip" data-latex="\Delta G = \Delta H - T\Delta S">ΔG</button>
        <button class="eq-chip" data-latex="\alpha \beta \gamma ">αβγ</button>
        <button class="eq-chip" data-latex="\pm \infty">±∞</button>
      </div>

      <!-- LaTeX / mixed input -->
      <div class="eq-input-wrap">
        <label class="eq-label">Input (Ctrl+Enter เพื่อแทรก)</label>
        <textarea id="eqInput" class="eq-input" rows="3"
          placeholder="เช่น: \frac{-b \pm \sqrt{b^2-4ac}}{2a}"></textarea>
      </div>

      <!-- Display mode toggle (hidden in mix mode) -->
      <div class="eq-options" id="displayModeRow">
        <label class="eq-switch">
          <input type="checkbox" id="eqDisplayMode" checked />
          <span class="eq-switch-label">Display mode (ขนาดใหญ่)</span>
        </label>
        <div class="eq-size-row">
          <label>ขนาด</label>
          <input type="range" id="eqScale" min="0.5" max="4" step="0.1" value="1.5" />
          <span id="eqScaleVal">1.5×</span>
        </div>
      </div>

      <!-- Preview -->
      <div class="eq-preview-label">ตัวอย่าง (พื้นหลังขาว = สีบนกระดาษจริง)</div>
      <div id="eqPreview" class="eq-preview"></div>
      <div id="eqError" class="eq-error" style="display:none"></div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="eqCancel">ยกเลิก</button>
        <button class="modal-btn modal-btn-ok" id="eqInsert">✨ แทรกลง Canvas</button>
      </div>
    </div>
  </div>

  <!-- ═══ IMAGE SEARCH MODAL ═══════════════════════════════════ -->
  <div id="imageSearchModal" class="modal-overlay" style="display:none">
    <div class="modal-box modal-box-wide">
      <div class="modal-header">
        <span class="modal-icon">🖼️</span>
        <h2 class="modal-title">ค้นหารูปฟรี (Wikimedia Commons)</h2>
        <button class="modal-close" id="imgModalClose">✕</button>
      </div>

      <div class="eq-input-wrap">
        <input type="text" id="imgSearchInput" class="panel-search"
          placeholder="🔍 ค้นหา เช่น: school, frame, science, cat..." style="width:100%;box-sizing:border-box" />
      </div>

      <div class="panel-filter-wrap" style="padding:0 0 10px 0">
        <label class="panel-filter-label">
          <input type="checkbox" id="imgMonolineOnly" checked />
          เน้น Monoline / Line Art
        </label>
      </div>

      <div class="eq-chips" id="imgCategoryChips"></div>

      <div id="imgSearchLoading" class="img-loading" style="display:none">⏳ กำลังค้นหา...</div>
      <div id="imgSearchError" class="eq-error" style="display:none"></div>

      <div id="imgSearchGrid" class="img-grid"></div>

      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="imgCancel">ปิด</button>
      </div>
    </div>
  </div>

  <footer class="app-footer">Copyright © 2026 The Coach inc.</footer>

  <script src="data/svgLibrary.js"></script>
  <script src="panel.js"></script>
  <script src="app.js"></script>
  <script src="toolbar.js"></script>
  <script src="export.js"></script>
  <script src="equation.js"></script>
  <script src="clipboard.js"></script>
  <script src="webImages.js"></script>
</body>

</html>
